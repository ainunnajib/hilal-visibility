[build]
  publish = "."

# Redirect rules for better SEO
[[redirects]]
  from = "/index"
  to = "/"
  status = 301

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
# Cache static assets
[[headers]]
  for = "/maps/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400" # 1 day
    
[[headers]]
  for = "/style.css*"
  [headers.values]
    Cache-Control = "public, max-age=300" # 5 min
    
[[headers]]
  for = "/app.js*"
  [headers.values]
    Cache-Control = "public, max-age=300" # 5 min

[[headers]]
  for = "/maps/maps_metadata.json"
  [headers.values]
    Cache-Control = "public, max-age=300" # 5 min

# Custom error page (optional)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 404